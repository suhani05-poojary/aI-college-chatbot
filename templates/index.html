<!DOCTYPE html>
<html>

<head>

<title>AI College Helpdesk Chatbot</title>

<style>

body{
font-family: Arial;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:420px;
background:white;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
}

.header{
background:#007bff;
color:white;
padding:15px;
text-align:center;
font-size:20px;
border-radius:10px 10px 0 0;
}

#chatbox{
height:350px;
overflow-y:auto;
padding:15px;
background:#f9f9f9;
}

.user{
text-align:right;
margin:10px 0;
}

.user span{
background:#007bff;
color:white;
padding:8px 12px;
border-radius:15px;
display:inline-block;
}

.bot{
text-align:left;
margin:10px 0;
}

.bot span{
background:#e4e6eb;
padding:8px 12px;
border-radius:15px;
display:inline-block;
}

.input-area{
display:flex;
padding:10px;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
outline:none;
}

button{
margin-left:10px;
padding:10px 15px;
background:#007bff;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
AI College Helpdesk Chatbot
</div>

<div id="chatbox"></div>

<div class="input-area">
<input id="textInput" type="text" placeholder="Ask your question...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

function sendMessage(){

var inputBox = document.getElementById("textInput");
var userText = inputBox.value;

if(userText.trim() === ""){
return;
}

var chatbox = document.getElementById("chatbox");

chatbox.innerHTML +=
"<div class='user'><span>"+userText+"</span></div>";

fetch("/get?msg="+userText)
.then(response=>response.text())
.then(data=>{

chatbox.innerHTML +=
"<div class='bot'><span>"+data+"</span></div>";

chatbox.scrollTop = chatbox.scrollHeight;

});

inputBox.value = "";

}

document.getElementById("textInput")
.addEventListener("keypress", function(e){
if(e.key === "Enter"){
sendMessage();
}
});

</script>

</body>

</html>
