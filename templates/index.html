<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Chatbot</title>

<style>
body{
font-family: Arial;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:420px;
background:white;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
}

.header{
background:#007bff;
color:white;
padding:15px;
text-align:center;
font-size:18px;
border-radius:10px 10px 0 0;
}

#chatbox{
height:350px;
overflow-y:auto;
padding:10px;
background:#f9f9f9;
}

.message{
margin:10px 0;
display:flex;
}

.user{
justify-content:flex-end;
}

.bot{
justify-content:flex-start;
}

.bubble{
padding:10px 14px;
border-radius:15px;
max-width:70%;
}

.user .bubble{
background:#007bff;
color:white;
}

.bot .bubble{
background:#e4e6eb;
color:black;
}

.input-area{
display:flex;
padding:10px;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
outline:none;
}

button{
margin-left:5px;
padding:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
AI College Helpdesk Chatbot
</div>

<div id="chatbox"></div>

<div class="input-area">
<input id="textInput" type="text" placeholder="Ask your question...">
<button onclick="sendMessage()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

</div>

<script>

window.onload = function(){
var chatbox = document.getElementById("chatbox");

chatbox.innerHTML +=
"<div class='message bot'><div class='bubble'>Hello! I can help you with admissions, fees, exams, hostel, and departments.</div></div>";
}

function sendMessage(){

var inputBox = document.getElementById("textInput");
var userText = inputBox.value;

if(userText.trim() === ""){
return;
}

var chatbox = document.getElementById("chatbox");

chatbox.innerHTML +=
"<div class='message user'><div class='bubble'>"+userText+"</div></div>";

fetch("/get?msg=" + encodeURIComponent(userText))
.then(response=>response.text())
.then(data=>{

chatbox.innerHTML +=
"<div class='message bot'><div class='bubble'>"+data.replace(/\n/g, "<br>")+"</div></div>";

chatbox.scrollTop = chatbox.scrollHeight;

});

inputBox.value = "";

}

document.getElementById("textInput")
.addEventListener("keypress", function(e){
if(e.key === "Enter"){
sendMessage();
}
});

function startVoice(){
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang = "en-US";

recognition.start();

recognition.onresult = function(event){
document.getElementById("textInput").value =
event.results[0][0].transcript;
}
}

</script>

</body>
</html>
